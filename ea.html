<!DOCTYPE html>
<html>
<head>
    <title>Theatre Location</title>

    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color:white;
            text-align: center;
            display: flex;
            flex-direction: column;
            background-image: url("login.webp");
            background-size: cover; 
            background-repeat: no-repeat; 
            background-position: center;
        }

        .container {
            margin-top: 30px;
        }

        iframe {
            border: none;
            border-radius: 10px;
        }

        .address {
            margin-top: 15px;
            font-size: 18px;
            color: white;
        }
    </style>
</head>

<body>

    <h1>Theatre Location</h1>

    <div class="container">

        <!-- Google Map with exact address -->
        <iframe
            src="https://www.google.com/maps?q=Express+Avenue+Mall+Royapettah+Chennai&output=embed"
            width="400"
            height="300">
        </iframe>

        <!-- Address Display -->
        <div class="address">
            PVR Escape Express Mall<br>
            Royapettah, Chennai, Tamil Nadu 600010
        </div>

    </div>

</body>
</html>
