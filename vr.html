<!DOCTYPE html>
<html>
<head>
    <title>Theatre Location</title>

    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color: rgb(227,7,7);
            text-align: center;
        }

        .container {
            margin-top: 30px;
        }

        iframe {
            border: none;
            border-radius: 10px;
        }

        .address {
            margin-top: 15px;
            font-size: 18px;
            color: #ff4c4c;
        }
    </style>
</head>

<body>

    <h1>Theatre Location</h1>

    <div class="container">

        <!-- Google Map with exact address -->
        <iframe
            src="https://www.google.com/maps?q=VR+Mall+Chennai+Anna+Nagar&output=embed"
            width="400"
            height="300">
        </iframe>

        <!-- Address Display -->
        <div class="address">
            VR mall<br>
            thirumangalam,Anna nagar, Chennai, Tamil Nadu 600040
        </div>

    </div>

</body>
</html>
