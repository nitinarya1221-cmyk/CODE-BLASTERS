<!DOCTYPE html>
<html>
<head>
<title>Movie Show Availability</title>

<style>

body{
font-family:Arial;
background:rgb(227,7,7);
margin:0;
padding:0;
}

/* Header */
.header{
background:#111;
padding:15px;
font-size:20px;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
color: aliceblue;
}

.runtime{
font-size:14px;
color:gray;
}

/* Date Bar */

.date-bar{
display:flex;
overflow-x:auto;
background:#111;
border-bottom:1px solid #ddd;
}

.date{
padding:10px 15px;
text-align:center;
min-width:70px;
cursor:pointer;
color: aliceblue;
}

.date.active{
background:#ff4d6d;
color:white;
font-weight:bold;
}

/* Theatre card */

.theatre{
background:#111;
margin:15px;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.theatre-name{
font-size:18px;
font-weight:bold;
margin-bottom:5px;
color: aliceblue;
}

.status{
font-size:13px;
color:gray;
margin-bottom:10px;
}

/* show timings */

.show-times{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.time{
border:2px solid green;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
color:#333;
background:#fff;
}

.time:hover{
background:green;
color:white;
}

</style>

</head>
