<!DOCTYPE html>
<html>
<head>
    <title>Download Ticket</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
            background-image: url("ticket1.jpeg");
    background-size: cover; 
    background-repeat: no-repeat; 
    background-position: center; 
        }

        .ticket {
            background: linear-gradient(135deg, #ff4b2b, #ff0000);
            width: 320px;
            margin-left: 200px;
            margin-top: 40px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }

        .ticket h2 {
            color: white;
            margin-bottom: 10px;
        }

        .ticket p {
            font-size: 16px;
            margin: 8px 0;
        }

        .divider {
            border-top: 2px dashed white;
            margin: 15px 0;
        }

        button {
            padding: 20px;
            background: red;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 320px;
            margin-left: 220px;
            margin-top: 20px;
            display: block;
        }

        button:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<h2>Your Movie Ticket 🎬</h2>

<div class="ticket" id="ticket">
    <h2>CineGo</h2>
    <img id="movieImg" style="width:100%; height:180px; border-radius:10px; margin-bottom:10px;">

    <div class="divider"></div>

    <p><b>Movie:</b> <span id="movie"></span></p>
    <p><b>Seats:</b> <span id="seats"></span></p>
    <p><b>Amount:</b> ₹<span id="amount"></span></p>
    <p><b>Theatre:</b> <span id="theatre"></span></p>
    <p><b>Show Time:</b> <span id="time"></span></p>

    <div class="divider"></div>

    <p>Enjoy your show 🍿</p>
</div>

<button onclick="downloadPDF()">Download Ticket (PDF)</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
window.onload = function() {
    console.log("Movie from storage:", localStorage.getItem("movieName"));
    console.log("Theatre from storage:", localStorage.getItem("theatreName"));
    console.log("Time from storage:", localStorage.getItem("showTime"));
    let amount = localStorage.getItem("ticketAmount") || "0";
    let seats = localStorage.getItem("selectedSeats") || "N/A";
    let movie = localStorage.getItem("movieName") || "Unknown";
    let image = localStorage.getItem("movieImage");
    let theatre = localStorage.getItem("theatreName") || "N/A";
    let time = localStorage.getItem("showTime") || "N/A";

    let today = new Date().toLocaleString();

    document.getElementById("movie").innerText = movie;
    document.getElementById("amount").innerText = amount;
    document.getElementById("seats").innerText = seats;
    document.getElementById("theatre").innerText = theatre;
    document.getElementById("time").innerText = time;
     if (image) {
        document.getElementById("movieImg").src = image;
    }
};

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let amount = localStorage.getItem("ticketAmount") || "0";
    let seats = localStorage.getItem("selectedSeats") || "N/A";
    let movie = localStorage.getItem("movieName") || "Unknown";
    let img = localStorage.getItem("movieImage");
    let theatre = localStorage.getItem("theatreName");
    let time = localStorage.getItem("showTime");

    doc.setFontSize(18);
    doc.text(" CineGo Movie Ticket", 20, 20);
    if (img) {
        doc.addImage(img, "JPEG", 20, 30, 60, 40);
    }


    doc.setFontSize(12);
    doc.text("Movie: " + movie, 20, 40);
    doc.text("Seats: " + seats, 20, 55);
    doc.text("Amount: ₹" + amount, 20, 70);
    doc.text("Theatre: " + theatre, 20, 85);
    doc.text("Show Time: " + time, 20, 100);

    doc.text("Enjoy your show!", 20, 110);

    doc.save("CineGo_Ticket.pdf");
}
</script>

</body>
</html>
