<!DOCTYPE html>
<html>
<head>
    <title>Download Ticket</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: left;
            background-image: url("ticket1.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            min-height: 100vh;
            margin: 0;
            padding: 30px;
        }

        h2 {
           text-align: center;
        }

        .ticket {
            background: linear-gradient(135deg, #ff4b2b, #ff0000);
            width: 420px;
            margin-top: 40px;
            margin-left: 30px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }

        .ticket h2 {
            color: white;
            margin: 0 0 10px 0;
        }

        .ticket p {
            font-size: 16px;
            margin: 8px 0;
        }

        .divider {
            border-top: 2px dashed white;
            margin: 15px 0;
        }

        #movieImg {
            width: 100%;
            height: 180px;
            border-radius: 10px;
            margin-bottom: 10px;
            object-fit: cover;
        }

        button {
            padding: 15px;
            background: red;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 320px;
            margin-left: 100px;
            margin-top: 20px;
            display: block;
        }

        button:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<h2>Your Movie Ticket</h2>

<div class="ticket" id="ticket">
    <h2>CineGo</h2>
    <img id="movieImg">

    <div class="divider"></div>

    <p><b>Movie:</b> <span id="movie"></span></p>
    <p><b>Seats:</b> <span id="seats"></span></p>
    <p><b>Amount:</b> Rs. <span id="amount"></span></p>
    <p><b>Theatre:</b> <span id="theatre"></span></p>
    <p><b>Show Time:</b> <span id="time"></span></p>

    <div class="divider"></div>

    <p>Enjoy your show!</p>
</div>

<button onclick="downloadPDF()">Download Ticket (PDF)</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
window.onload = function() {
    let amount = localStorage.getItem("ticketAmount") || "60";
    let seats = localStorage.getItem("selectedSeats") || "B1, B2";
    let movie = localStorage.getItem("movieName") || "Thaai Kizhavi";
    let image = localStorage.getItem("movieImage");
    let theatre = localStorage.getItem("theatreName") || "The Vijay Park Multiplex";
    let time = localStorage.getItem("showTime") || "10:00 PM";

    document.getElementById("movie").innerText = movie;
    document.getElementById("amount").innerText = amount;
    document.getElementById("seats").innerText = seats;
    document.getElementById("theatre").innerText = theatre;
    document.getElementById("time").innerText = time;

    if (image) {
        document.getElementById("movieImg").src = image;
    } else {
        document.getElementById("movieImg").src = "ticket1.jpeg";
    }
};

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const ticket = document.getElementById("ticket");

    html2canvas(ticket, {
        scale: 2,
        useCORS: true
    }).then(canvas => {
        const imgData = canvas.toDataURL("image/png");

        const pdf = new jsPDF("p", "mm", "a4");

        const imgWidth = 100;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        pdf.addImage(imgData, "PNG", 10, 20, imgWidth, imgHeight);

        pdf.save("CineGo_Ticket.pdf");
    });
}
</script>

</body>
</html>
