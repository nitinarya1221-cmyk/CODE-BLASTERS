<!DOCTYPE html>
<html>
<head>
    <title>CineGo Payment</title>

    <style>
        body {
            background: #111;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            background-image:
url("first.jpg");
background-size:cover;
background-position:center;
height:550px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
 height: 500px;
    background: linear-gradient(to bottom,rgba(28, 27, 27, 0.6), rgba(0,0,0,0.8)),
                url("first.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    
}
        

        .container {
            width: 350px;
            padding: 25px;
            border: 2px solid red;
            border-radius: 15px;
            background: #000;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border: none;
            border-radius: 5px;
        }

        .amount {
            background: #222;
            color: white;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 12px;
            background: red;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Ticket Payment</h2>

    <input type="text" id="cardName" placeholder="Enter name on card" oninput="validateName()">
<span id="nameError" style="color:red;"></span>

    <label>Card Number</label>
    <input type="text" placeholder="1234 5678 9012 3456">

    <label>Amount</label>
    <input type="text" id="amount" class="amount" readonly>
    <button onclick="payNow()">Pay Now</button>
</div>

<script>
function validateName() {
    let name = document.getElementById("cardName").value.trim();
    let error = document.getElementById("nameError");

    let regex = /^[A-Za-z ]+$/;

    if (name === "") {
        error.textContent = "Name cannot be empty";
        return false;
    }

    if (!regex.test(name)) {
        error.textContent = "Incorrect format";
        return false;
    }

    error.textContent = "";
    return true; 
}

function payNow() {
    let isValid = validateName(); 

    if (isValid === true) {
        window.location.href = "success.html";
    } else {
        alert("Please enter a valid Card Holder Name");
    }
}
    window.onload = function () {
    let amount = localStorage.getItem("totalAmount");

    if (amount) {
        document.getElementById("amount").value = "₹ " + amount;
    } else {
        document.getElementById("amount").value = "₹ 0";
    }
};
</script>

</body>
</html>
