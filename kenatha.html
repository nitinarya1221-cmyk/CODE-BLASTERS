<!DOCTYPE html>
<html>
<head>
<title>Movie Show Availability</title>

<style>

body{
font-family:Arial;
background:rgb(224, 141, 141);
margin:0;
padding:0;
flex-direction: column;
            background-image: url("login.webp");
            background-size: cover; 
            background-repeat: no-repeat; 
            background-position: center;
}

/* Header */
.header{
background:black;
padding:15px;
font-size:20px;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
color: aliceblue;
}

.runtime{
font-size:14px;
color:gray;
}

/* Date Bar */

.date-bar{
display:flex;
overflow-x:auto;
background:black;
border-bottom:1px solid #ddd;
}

.date{
padding:10px 15px;
text-align:center;
min-width:70px;
cursor:pointer;
color: aliceblue;
}

.date.active{
background:#ff4d6d;
color:white;
font-weight:bold;
}

/* Theatre card */

.theatre{
background: rgba(0, 0, 0, 0.6);
    border-radius: 10px;
    padding: 20px;
    margin: 20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.theatre-name{
font-size:18px;
font-weight:bold;
margin-bottom:5px;
color: aliceblue;
}

.status{
font-size:13px;
color:gray;
margin-bottom:10px;
}

/* show timings */

.show-times{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.time{
border:2px solid green;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
color:#333;
background:#fff;
}

.time:hover{
background:green;
color:white;
}

</style>

</head>

<body>

<div class="header">
Kenatha kaanom
<div class="runtime">Movie runtime: 3h 55m</div>
</div>


<div class="date-bar">
<a href="thur.html">
<div class="date active">THU<br>19</div></a>
<a href="fri.html">
<div class="date">FRI<br>20</div></a>
<a href="sat..html">
<div class="date">SAT<br>21</div></a>
<a href="sun.html">
<div class="date">SUN<br>22</div></a>
<a href="mon.html">
<div class="date">MON<br>23</div></a>
</div>


<!-- Theatre 1 -->

<div class="theatre">
<div class="theatre-name">PVR VR Chennai, Anna Nagar</div>
<div class="status">Non-cancellable</div>
<div class="show-times">
<div class="time" onclick="selectShow('PVR VR Chennai, Anna Nagar', '05:40 PM')">05:40 PM</div>
</div>
</div>


<!-- Theatre 2 -->

<div class="theatre">
<div class="theatre-name">The Vijay Park Multiplex: Injambakkam</div>
<div class="status">Cancellation available</div>

<div class="show-times">
<div class="time" onclick="selectShow('The Vijay Park Multiplex', '10:50 PM')">10:50 AM</div>
<div class="time" onclick="selectShow('The Vijay Park Multiplex', '05:40 PM')">05:40 PM</div>
<div class="time" onclick="selectShow('The Vijay Park Multiplex', '10:00 PM')">10:00 PM</div>
</div>
</div>


<!-- Theatre 3 -->

<div class="theatre">
<div class="theatre-name">Rohini Silver Screens: Koyambedu</div>
<div class="status">Non-cancellable</div>

<div class="show-times">
<div class="time" onclick="selectShow('Rohini Silver Screens: Koyambedu', '07:50 AM')">07:50 AM</div>    
<div class="time" onclick="selectShow('Rohini Silver Screens: Koyambedu', '11:30 AM')">11:30 AM</div>
<div class="time" onclick="selectShow('Rohini Silver Screens: Koyambedu', '05:00 AM')">05:00 PM</div>
<script>
function selectShow(theatre, time) {
    localStorage.setItem("theatreName", theatre);
    localStorage.setItem("showTime", time);

    console.log("Theatre:", theatre);
    console.log("Time:", time);

    window.location.href = "code1.html";
}
</script>

</body>
</html>
